<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VMExec</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-3xl font-extrabold text-center tracking-tight"><span class="text-orange-500">VM</span><span class="text-gray-800">Exec</span></h1>
            {% if mfa_step %}
            <p class="text-sm text-gray-500 mt-2">Enter your authenticator code</p>
            {% else %}
            <p class="text-sm text-gray-500 mt-2">Sign in to continue</p>
            {% endif %}
        </div>

        {% if error %}
        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if mfa_step %}
        <div class="mb-6 text-center">
            <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center mx-auto mb-3">
                <svg class="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <p class="text-sm text-gray-600">Signed in as <span class="font-semibold text-gray-800">{{ username }}</span></p>
            <p class="text-xs text-gray-400 mt-1">Open your authenticator app and enter the 6-digit code.</p>
        </div>

        <form action="/login/mfa" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Authentication code</label>
                <input type="text" name="mfa_code" required autofocus
                       maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
                       placeholder="000000"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 text-center tracking-widest text-lg">
            </div>

            <button type="submit" class="w-full bg-orange-500 text-white font-bold py-2 px-4 rounded hover:bg-orange-600">
                Verify &amp; Sign In
            </button>
        </form>

        <p class="text-center mt-4">
            <a href="/login?cancel=1" class="text-sm text-gray-500 hover:text-gray-700">Use a different account</a>
        </p>
        {% else %}
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" required autofocus class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
            </div>

            <button type="submit" class="w-full bg-orange-500 text-white font-bold py-2 px-4 rounded hover:bg-orange-600">
                Sign In
            </button>
        </form>
        {% endif %}
    </div>
</body>
</html>
