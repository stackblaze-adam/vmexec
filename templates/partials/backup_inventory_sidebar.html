<div id="backup-inventory-panel" data-exclude-infra-vms="{% if not config or config.exclude_infra_vms %}1{% else %}0{% endif %}">
    <div class="px-4 py-3 border-b" style="border-color: var(--border-color); background: var(--bg-nav)">
        <form action="/fetch_vms" method="POST" class="flex flex-col gap-2" onsubmit="sessionStorage.setItem('novabak_inventory_drawer','1'); localStorage.setItem('activeTab','tab-jobs');">
            <select name="esxi_host_id" required class="py-2 px-3 text-xs rounded w-full">
                <option value="" disabled selected>Select host…</option>
                {% for host in esxi_hosts %}
                <option value="{{ host.id }}">{{ host.name }} ({{ host.host_ip }}){% if host.connection_type == 'vcenter' %} · vCenter{% elif host.connection_type == 'standalone' %} · ESXi{% endif %}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn-primary px-3 py-2 text-xs font-semibold w-full">Scan datacenter</button>
        </form>
    </div>
    <div class="inventory-scroll overflow-x-auto overflow-y-auto">
        <table class="min-w-full text-left text-xs">
            <thead style="background-color: var(--bg-nav); border-bottom: 1px solid var(--border-color)">
                <tr>
                    <th class="px-3 py-2 font-semibold w-12 text-center">
                        <input type="checkbox" id="inventory-select-all" class="w-3.5 h-3.5 rounded cursor-pointer" title="Select all" onchange="toggleInventorySelectAll(this.checked)" aria-label="Select all for backup">
                    </th>
                    <th class="px-3 py-2 font-semibold w-20 text-center">Power</th>
                    <th class="px-3 py-2 font-semibold">Virtual Machine</th>
                </tr>
            </thead>
            <tbody class="divide-y" style="border-color: var(--border-color)">
                {% for vm in vms %}
                <tr>
                    <td class="px-3 py-2 text-center">
                        <input type="checkbox"
                               class="inventory-vm-cb w-3.5 h-3.5 rounded cursor-pointer"
                               data-vm-id="{{ vm.id }}"
                               data-is-infra="{% if vm.vm_name | is_infra_vm %}1{% else %}0{% endif %}"
                               data-initial="{% if vm.is_selected %}1{% else %}0{% endif %}"
                               {% if vm.is_selected %}checked{% endif %}
                               onchange="updateInventorySelectionCount()">
                    </td>
                    <td class="px-3 py-2 text-center">
                        {% if vm.power_state == 'poweredOn' %}
                            <span class="status-badge status-success text-[10px]" title="Powered On">ON</span>
                        {% elif vm.power_state == 'poweredOff' %}
                            <span class="status-badge status-neutral text-[10px]" title="Powered Off">OFF</span>
                        {% else %}
                            <span class="status-badge status-neutral text-[10px]" title="{{ vm.power_state }}">{{ vm.power_state or '?' }}</span>
                        {% endif %}
                    </td>
                    <td class="px-3 py-2">
                        <div class="font-medium truncate max-w-[240px]" title="{{ vm.vm_name }}">{{ vm.vm_name }}</div>
                        <div class="text-[10px] font-mono opacity-60 truncate">{{ vm.esxi_host.name }}</div>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="px-3 py-8 text-center font-medium text-xs" style="color: var(--text-muted)">No inventory. Run a scan.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
