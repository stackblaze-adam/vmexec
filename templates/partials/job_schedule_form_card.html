<form id="job-form-card-{{ vm.id }}" action="/update_job" method="POST" class="job-schedule-card">
    <input type="hidden" name="vm_id" value="{{ vm.id }}">

    <div class="mb-2">
        <div class="flex items-center justify-between mb-1">
            <span class="input-label text-[10px]">Frequency</span>
            <span class="job-save-flash text-[10px] font-semibold text-green-400 opacity-0 transition-opacity duration-500">✓ Saved</span>
        </div>
        <select name="schedule_frequency"
                class="w-full py-1.5 px-2 text-xs font-semibold rounded border mt-1"
                style="border-color: var(--border-color); background: var(--bg-card); color: var(--text-main)"
                onchange="showDaysRow({{ vm.id }}); autoSaveJob({{ vm.id }}, this.form)">
            {% for freq_val, freq_label in [('daily','Daily'),('weekly','Weekly'),('monthly','Monthly')] %}
            <option value="{{ freq_val }}" {% if (vm.schedule_frequency or 'daily') == freq_val %}selected{% endif %}>{{ freq_label }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-2 job-days-row">
        <div class="flex items-center justify-between">
            <span class="input-label text-[10px]">Days</span>
            <span class="job-days-hint text-[9px] opacity-50"></span>
        </div>
        <input type="hidden" name="schedule_days" class="job-days-hidden" value="{{ vm.schedule_days or '0,1,2,3,4,5,6' }}">
        <div class="grid grid-cols-7 gap-0.5 mt-1">
            {% set cur_days = (vm.schedule_days or '0,1,2,3,4,5,6').split(',') %}
            {% for day_num, day_lbl in [(0,'Mo'),(1,'Tu'),(2,'We'),(3,'Th'),(4,'Fr'),(5,'Sa'),(6,'Su')] %}
            <label class="relative cursor-pointer">
                <input type="checkbox"
                       class="job-day-cb sr-only peer"
                       data-day="{{ day_num }}"
                       {% if day_num|string in cur_days %}checked{% endif %}
                       onchange="updateDaysHidden({{ vm.id }}); autoSaveJob({{ vm.id }}, this.form)">
                <div class="text-center text-[9px] font-bold py-1 rounded border transition-all
                            peer-checked:border-[var(--brand)] peer-checked:text-[var(--brand)] peer-checked:bg-blue-500/10
                            border-[var(--border-color)] text-[var(--text-muted)] hover:border-[var(--brand)]/50">
                    {{ day_lbl }}
                </div>
            </label>
            {% endfor %}
        </div>
    </div>

    <div class="grid grid-cols-[1fr_1fr_1fr_auto] gap-2 items-end mb-2">
        <div>
            <span class="input-label text-[10px]">Hour</span>
            <input type="number" name="schedule_hour" value="{{ vm.schedule_hour }}" min="0" max="23"
                   class="w-full px-2 py-1 text-center font-mono text-sm"
                   oninput="debounceJobSave({{ vm.id }}, this.form)">
        </div>
        <div>
            <span class="input-label text-[10px]">Min</span>
            <input type="number" name="schedule_minute" value="{{ vm.schedule_minute }}" min="0" max="59"
                   class="w-full px-2 py-1 text-center font-mono text-sm"
                   oninput="debounceJobSave({{ vm.id }}, this.form)">
        </div>
        <div>
            <span class="input-label text-[10px]">Keep</span>
            <input type="number" name="retention_count" value="{{ vm.retention_count }}" min="1" max="60"
                   class="w-full px-2 py-1 text-center font-mono text-sm"
                   oninput="debounceJobSave({{ vm.id }}, this.form)">
        </div>
        <div class="flex flex-col items-center gap-1 pb-0.5">
            <span class="input-label text-[10px]">Active</span>
            <label class="relative w-9 h-5 cursor-pointer">
                <input type="checkbox" name="is_job_active" value="True"
                       {% if vm.is_job_active %}checked{% endif %}
                       class="sr-only peer"
                       onchange="autoSaveJob({{ vm.id }}, this.form)">
                <div class="absolute inset-0 rounded-full bg-gray-600 peer-checked:bg-[var(--brand)] transition-colors"></div>
                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow peer-checked:translate-x-4 transition-transform"></div>
            </label>
        </div>
    </div>

    <div class="pt-2" style="border-top: 1px dashed var(--border-color)">
        <div class="flex items-center gap-2">
            <span class="input-label text-[10px] shrink-0">Mode</span>
            <label class="flex items-center gap-2 cursor-pointer flex-1 min-w-0" title="Power off shuts down the VM before backup for faster transfer, then powers it back on.">
                <div class="relative flex-shrink-0 w-9 h-5">
                    <input type="checkbox" name="power_off_for_backup" value="True"
                           {% if vm.power_off_for_backup %}checked{% endif %}
                           class="sr-only peer"
                           onchange="updatePowerModeLabel({{ vm.id }}); autoSaveJob({{ vm.id }}, this.form)">
                    <div class="absolute inset-0 rounded-full bg-gray-600 peer-checked:bg-orange-500 transition-colors"></div>
                    <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow peer-checked:translate-x-4 transition-transform"></div>
                </div>
                <span class="job-power-mode-label text-[10px] font-medium leading-tight {% if vm.power_off_for_backup %}text-orange-500{% else %}text-emerald-600{% endif %}">
                    {% if vm.power_off_for_backup %}Power off — faster backup{% else %}Live — VM stays on{% endif %}
                </span>
            </label>
        </div>
    </div>

    {% include 'partials/job_schedule_cbt_row.html' %}
</form>
