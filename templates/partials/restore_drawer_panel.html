<div id="restore-drawer-panel">
    <div class="px-4 py-3 border-b" style="border-color: var(--border-color); background: var(--bg-nav)">
        <div class="flex flex-col gap-2">
            <input type="text" id="vmSearchInput" placeholder="Search backups…" oninput="filterVmList()" class="w-full py-2 px-3 text-xs hidden" autocomplete="off">
            <button type="button" onclick="loadGroupedBackups()" class="btn-primary px-3 py-2 text-xs font-semibold w-full">Scan repository</button>
        </div>
    </div>

    <div class="inventory-scroll overflow-x-auto overflow-y-auto">
        <table class="min-w-full text-left text-xs">
            <thead style="background-color: var(--bg-nav); border-bottom: 1px solid var(--border-color)">
                <tr>
                    <th class="px-3 py-2 font-semibold w-8" aria-label="Selected"></th>
                    <th class="px-3 py-2 font-semibold">Virtual Machine</th>
                    <th class="px-3 py-2 font-semibold w-16 text-center">Versions</th>
                </tr>
            </thead>
            <tbody id="vmList" class="divide-y" style="border-color: var(--border-color)">
                <tr id="vmListEmpty">
                    <td colspan="3" class="px-3 py-8 text-center font-medium text-xs" style="color: var(--text-muted)">No backups loaded. Scan repository.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="versionSection" class="hidden border-t flex flex-col min-h-0" style="border-color: var(--border-color)">
        <div class="px-3 py-2 text-[10px] font-bold uppercase tracking-wide border-b" style="color: var(--text-muted); border-color: var(--border-color); background: var(--bg-nav)">Backup version</div>
        <div class="restore-scroll-versions overflow-x-auto overflow-y-auto">
            <table class="min-w-full text-left text-xs">
                <thead style="background-color: var(--bg-nav); border-bottom: 1px solid var(--border-color)">
                    <tr>
                        <th class="px-3 py-2 font-semibold w-8" aria-label="Selected"></th>
                        <th class="px-3 py-2 font-semibold">Date</th>
                        <th class="px-3 py-2 font-semibold w-24 text-center">Type</th>
                        <th class="px-3 py-2 font-semibold w-20 text-right">Size</th>
                    </tr>
                </thead>
                <tbody id="versionList" class="divide-y" style="border-color: var(--border-color)"></tbody>
            </table>
        </div>
        <input type="hidden" name="source_ova" id="selectedOvaPath" form="restoreForm" required>
        <p id="selectedVersionLabel" class="hidden"></p>
        <div id="chainSection" class="hidden border-t px-4 py-3" style="border-color: var(--border-color); background: var(--bg-nav)">
            <span class="input-label">CBT backup chain</span>
            <p class="text-[10px] opacity-50 mb-2">Full → incremental → synthetic timeline</p>
            <div id="chainTimeline" class="rounded border px-3 py-2 text-xs" style="border-color: var(--border-color); max-height: 120px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="px-4 py-3 border-t flex-shrink-0" style="border-color: var(--border-color); background: var(--bg-nav)">
        <form action="/restore" method="POST" id="restoreForm" class="flex flex-col gap-3" data-confirm="Launch restore to the target host? Existing VMs with the same name may conflict if running." data-confirm-title="Launch restore">
            <div>
                <span class="input-label">Target hypervisor</span>
                <select name="target_esxi_id" id="esxiSelect" onchange="loadDatastores(this.value)" required class="w-full py-2 px-3 text-xs mt-1">
                    <option value="" disabled selected>Select restoration target…</option>
                    {% for host in esxi_hosts %}
                    <option value="{{ host.id }}">{{ host.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <span class="input-label">Target datastore</span>
                <select name="datastore" id="datastoreSelect" required class="w-full py-2 px-3 text-xs mt-1">
                    <option value="" disabled selected>Select host first…</option>
                </select>
            </div>
            <div>
                <span class="input-label">New VM name</span>
                <input type="text" name="target_name" id="restoreTargetName" placeholder="e.g. MyVM_Restored" required class="w-full py-2 px-3 text-xs mt-1">
            </div>
        </form>
    </div>
</div>
